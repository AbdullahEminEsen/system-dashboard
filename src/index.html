<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <title>System Dashboard</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-card: #1a1d27;
      --bg-input: #2d3148;
      --border: #2d3148;
      --border-input: #3d4460;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }

    body.light {
      --bg-primary: #f1f5f9;
      --bg-card: #ffffff;
      --bg-input: #e2e8f0;
      --border: #e2e8f0;
      --border-input: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 420px;
      overflow: hidden;
      user-select: none;
      transition: background 0.3s, color 0.3s;
    }

    .titlebar {
      -webkit-app-region: drag;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .titlebar h1 {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .titlebar .right {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .uptime-badge {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 2px 8px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .close-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5f57;
      border: none;
      cursor: pointer;
    }

    .content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      transition: border 0.2s;
    }

    .card-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 10px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 26px;
      font-weight: 600;
      line-height: 1;
    }

    .unit {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .bar-bg {
      background: var(--bg-input);
      border-radius: 4px;
      height: 6px;
      margin-top: 10px;
      overflow: hidden;
    }

    .bar {
      height: 6px;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .clock-value {
      font-size: 34px;
      font-weight: 600;
      letter-spacing: -1px;
    }

    .net-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .net-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .net-val {
      font-size: 16px;
      font-weight: 500;
    }

    .weather-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 4px;
    }

    .weather-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: var(--bg-input);
      flex-shrink: 0;
    }

    .weather-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-group .card {
      width: 100%;
      min-width: 0;
    }
  </style>
</head>

<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <i data-lucide="layout-dashboard" style="width:14px;height:14px;color:#94a3b8"></i>
      <h1>System Dashboard</h1>
    </div>
    <div class="right">
      <span class="uptime-badge">
        <i data-lucide="monitor" style="width:10px;height:10px"></i>
        <span id="uptime">—</span>
      </span>
      <button class="icon-btn" id="themeBtn">
        <i data-lucide="sun" style="width:13px;height:13px;color:#64748b" id="themeIcon"></i>
      </button>
      <button class="icon-btn" id="settingsBtn">
        <i data-lucide="settings" style="width:13px;height:13px;color:#64748b"></i>
      </button>
      <button class="icon-btn" id="editorBtn">
        <i data-lucide="sliders-horizontal" style="width:13px;height:13px;color:#64748b"></i>
      </button>
      <button class="close-btn" id="closeBtn"></button>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Kartlar renderer.js tarafından dinamik olarak oluşturulur -->
  </div>

  <script>lucide.createIcons()</script>
  <script src="renderer.js"></script>
</body>

</html>
